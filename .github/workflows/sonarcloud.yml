name: SonarCloud analysis

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

permissions:
  contents: read

jobs:
  sonarcloud:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Compile Java source files only
        run: |
          mkdir -p build/classes
          find ./src -name "*.java" \
            ! -name "*Test.java" \
            ! -name "AllTests.java" > main_sources.txt
          javac -encoding UTF-8 -d build/classes @main_sources.txt

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=komalkhan-0811_SFWRENG-2AA4-Catan
            -Dsonar.organization=komalkhan-0811
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*Test.java,**/AllTests.java
            -Dsonar.java.binaries=build/classes
